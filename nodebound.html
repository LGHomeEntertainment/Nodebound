<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Nodebound Idle v0.1</title>
    <style>
      body {
        background: black;
        color: #33ff33;
        font-family: monospace;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;

        user-select: none; /* disables text highlight */
      }

      #blackscreen {
        position: absolute;
        inset: 0;
        background: black;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.8s ease;
      }

      #gameArea {
        position: relative;
        width: 800px;
        height: 500px;
        padding: 15px;
        display: flex;
        flex-direction: column;
      }

      .framed {
        border: 2px solid #33ff33;
      }

      #hud {
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      #terminal {
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
        padding-bottom: 18px;
      }

      #input {
        color: darkgrey;
        margin-top: 10px;
      }

      #shopButton {
        margin-top: 6px;
        font-size: 14px;
        color: #33ff33;
        cursor: pointer;
        opacity: 0.8;
      }

      #shopButton:hover {
        opacity: 1;
      }

#shopPanel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 350px;
  background: black;
  border: 2px solid #33ff33;
  padding: 15px;
  color: #33ff33;

  opacity: 0;
  transition: opacity 0.15s ease;
  pointer-events: none;
  z-index: 10;
}

      #shopPanel.open {
        opacity: 1;
        pointer-events: auto;
      }

      .cursor {
        display: inline-block;
        width: 10px;
        background: #33ff33;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      @keyframes borderBlink {
        0% {
          border-color: #33ff33;
        }
        50% {
          border-color: transparent;
        }
        100% {
          border-color: #33ff33;
        }
      }

      @keyframes screenFlash {
        0% {
          background: black;
        }
        50% {
          background: white;
        }
        100% {
          background: black;
        }
      }

      .flash {
        animation: screenFlash 0.35s ease;
      }

      .blinking {
        animation: borderBlink 0.4s ease 2;
      }
    </style>
  </head>
  <body>
    <div id="gameArea">
      <div id="blackscreen"></div>
      <div id="hud"></div>
      <div id="terminal"></div>
      <div id="input">
        > <span id="command"></span><span class="cursor"></span>
      </div>
      <div id="shopButton">[ Upgrades ]</div>
      <div id="shopPanel"></div>
    </div>

    <script>
      // =======================
      // DOM REFERENCES
      // =======================
      const hud = document.getElementById("hud");
      const terminal = document.getElementById("terminal");
      const commandEl = document.getElementById("command");
      const gameArea = document.getElementById("gameArea");
      const black = document.getElementById("blackscreen");
      const shopButton = document.getElementById("shopButton");
      const shopPanel = document.getElementById("shopPanel");
      let shopOpen = false;

      // =======================
      // CONFIG
      // =======================
      let devMode = false;
      let devLayer = 1;
      let devStartBW = 500;

      // =======================
      // GAME STATE
      // =======================
      let state = {
        layer: 0,
        nodes: 0,
        bandwidth: 0,
        bandwidthPerNode: 0.1,
        phase: "idle",
        currentCommand: "",
        lastTime: performance.now(),
        scanTime: 3000,
        connectTime: 1500,

        overclockLevel: 0,
        autoLevel: 0,
      };

      // =======================
      // UPGRADE SYSTEM
      // =======================
      const upgrades = {
        overclock: {
          key: "1",
          getLevel: () => state.overclockLevel,
          getCost: () => 50 + state.overclockLevel * 50,
          purchase: () => {
            state.overclockLevel++;
            state.scanTime = Math.max(1000, state.scanTime * 0.85);
            printLine("CPU Overclocked. Scan speed increased.");
          },
        },
      };

      function renderShop() {
        let output = "=== Upgrade Interface ===\n\n";

        for (const id in upgrades) {
          const upg = upgrades[id];
          const level = upg.getLevel();
          const cost = upg.getCost();

          output += `${upg.key}) CPU Overclock (Lv ${level}) .... ${cost} BW\n`;
        }

        shopPanel.innerText = output;
      }

      // =======================
      // UTILITIES (Pure Helper Functions)
      // =======================
      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function setInputEnabled(enabled) {
        if (enabled) {
          document.body.style.pointerEvents = "auto";
        } else {
          document.body.style.pointerEvents = "none";
        }
      }

      // =======================
      // RENDER SYSTEM
      // =======================
      function updateHUD() {
        const bwPerSec = state.nodes * state.bandwidthPerNode;
        hud.innerText =
          "Nodes: " +
          state.nodes +
          " | Bandwidth: " +
          state.bandwidth.toFixed(1) +
          " | BW/sec: " +
          bwPerSec.toFixed(2);
      }

      function updateShop() {
        if (state.layer === 0) return;

        let output = "";

        for (const id in upgrades) {
          const upg = upgrades[id];
          const level = upg.getLevel();
          const cost = upg.getCost();

          output += `[${upg.key}] Overclock CPU (Lv ${level})
Cost: ${cost} BW\n\n`;
        }

        shop.innerText = output;
      }

      // =======================
      // INPUT SYSTEM
      // =======================
      function getExpectedCommand() {
        if (state.phase === "idle") return "scan ";
        if (state.phase === "connect_ready") return "connect ";
        return null;
      }

      function handleClick() {
        if (state.phase !== "idle" && state.phase !== "connect_ready") return;

        const expected = getExpectedCommand();
        if (!expected) return;

        state.currentCommand += expected[state.currentCommand.length];
        commandEl.textContent = state.currentCommand;

        if (state.currentCommand === expected) {
          executeCommand(expected);
          state.currentCommand = "";
          commandEl.textContent = "";
        }
      }

      document
        .getElementById("gameArea")
        .addEventListener("click", handleClick);

      document.addEventListener("keydown", (e) => {
        for (const id in upgrades) {
          const upg = upgrades[id];
          if (e.key === upg.key) {
            const cost = upg.getCost();
            if (state.bandwidth >= cost) {
              state.bandwidth -= cost;
              upg.purchase();
            }
          }
        }
      });

      shopButton.addEventListener("click", (e) => {
        e.stopPropagation();
        shopOpen = !shopOpen;

        if (shopOpen) {
          renderShop();
          shopPanel.classList.add("open");
        } else {
          shopPanel.classList.remove("open");
        }
      });

      shopPanel.addEventListener("click", (e) => {
        e.stopPropagation();
      });

      // =======================
      // COMMAND SYSTEM
      // =======================
      async function printLine(text, speed = 50) {
        state.inputLocked = true;

        terminal.scrollTop = terminal.scrollHeight;

        return new Promise((resolve) => {
          let i = 0;
          const line = document.createElement("div");
          terminal.appendChild(line);

          function type() {
            if (i < text.length) {
              line.textContent += text[i];
              i++;
              setTimeout(type, speed);
            } else {
              state.inputLocked = false;
              resolve();
            }
          }
          type();
        });
      }

      async function executeCommand(cmd) {
        setInputEnabled(false);
        if (cmd === "scan ") {
          state.phase = "scanning";
          await printLine("> scan");
          const variance = state.scanTime * 0.1; // 10%
          const actualTime =
            state.scanTime + (Math.random() * variance - variance / 2);
          await progressAnimation("Scanning", actualTime);

          let success = true;

          if (state.layer === 0) {
            success = true; // tutorial always succeeds
          } else {
            success = Math.random() >= 0.1; // 10% fail from layer 1+
          }

          if (!success) {
            await printLine("No node found.");
            setInputEnabled(true);
            state.phase = "idle";
          } else {
            await printLine("Node Found.");
            setInputEnabled(true);
            state.phase = "connect_ready";
          }
        } else if (cmd === "connect ") {
          state.phase = "connecting";
          await printLine("> connect");
          const variance = state.connectTime * 0.1; // 10%
          const actualTime =
            state.connectTime + (Math.random() * variance - variance / 2);
          await progressAnimation("Connecting", actualTime);
          state.nodes += 1;
          state.bandwidth += 5;
          await printLine("Node integrated. Bandwidth +5.");

          if (!devMode && state.layer == 0 && state.nodes >= 1) {
            state.phase = "locked";

            await delay(1500);

            // quick flicker
            gameArea.classList.add("flash");
            await delay(550);
            gameArea.classList.remove("flash");

            await printLine(">>> Network capacity reached.");
            await delay(2000);
            // quick flicker
            gameArea.classList.add("flash");
            await delay(550);
            gameArea.classList.remove("flash");

            await transitionToLayer1();
            return;
          }
          setInputEnabled(true);
          state.phase = "idle";
        }
      }

      async function progressAnimation(label, duration) {
        state.inputLocked = true;

        const line = document.createElement("div");
        terminal.appendChild(line);

        let dots = 0;
        const interval = 750;
        const start = performance.now();

        while (performance.now() - start < duration) {
          dots++;
          line.textContent = label + " " + ".".repeat(dots);
          terminal.scrollTop = terminal.scrollHeight;
          await delay(interval);
        }

        state.inputLocked = false;
      }

      async function transitionToLayer1() {
        setInputEnabled(false);
        state.phase = "locked";
        await delay(500);

        // old machine overload
        await printLine(">>> System overload.");
        await delay(500);

        gameArea.classList.add("blinking");
        await delay(600);
        gameArea.classList.remove("blinking");

        gameArea.classList.remove("framed");

        black.style.opacity = 1;
        await delay(2000);

        terminal.innerHTML = "";

        // switch logic only
        state.layer = 1;
        initialiseLayer(1);

        // ensure visuals are off
        hud.style.opacity = 0;
        shopButton.style.opacity = 0;

        await delay(800);

        // new machine case appears
        gameArea.classList.add("framed");
        gameArea.classList.add("blinking");
        await delay(600);
        gameArea.classList.remove("blinking");

        black.style.opacity = 0;
        await delay(800);

        // BOOT SEQUENCE
        await printLine(">>> Booting system...");
        await delay(1000);

        // HUD powers on
        hud.style.opacity = 1;
        await delay(800);
        await printLine(">>> System booted.");
        await delay(800);

        await printLine(">>> Initialising upgrades...");
        await delay(1200);
        shopButton.style.opacity = 1;
        await delay(800);
        await printLine(">>> Upgrade interface initialized.");

        await printLine(">>> System ready.");

        setInputEnabled(true);
        state.phase = "idle";
      }

      // =======================
      // LAYER SYSTEM
      // =======================
      function initialiseLayer(layerNumber) {
        state.layer = layerNumber;

        if (layerNumber == 0) {
          // Tutorial
          state.nodes = 0;
          state.bandwidth = 0;
          state.phase = "idle";
          shopButton.style.opacity = 0;
        }

        if (layerNumber == 1) {
          // First PC
          state.nodes = 0;
          state.bandwidth = devMode ? devStartBW : 0;
          state.phase = "idle";
        }
      }

      // =======================
      // GAME LOOP
      // =======================
      function gameLoop(now) {
        const delta = (now - state.lastTime) / 1000;
        state.lastTime = now;

        state.bandwidth += state.nodes * state.bandwidthPerNode * delta;

        updateHUD();
        requestAnimationFrame(gameLoop);
      }

      // =======================
      // BOOT SEQUENCE
      // =======================
      async function boot() {
        setInputEnabled(false);

        if (devMode) {
          initialiseLayer(devLayer);
          terminal.innerHTML = "";

          // Enable visuals immediately for dev
          if (devLayer >= 1) {
            hud.style.opacity = 1;
            shopButton.style.opacity = 1;
          }

          await printLine(">>> DEV MODE ACTIVE");
          await printLine(">>> Layer " + devLayer + " initialised.");
        } else {
          initialiseLayer(0);
          await printLine(">>> Click to type.");
        }

        setInputEnabled(true);
      }

      gameArea.classList.add("framed");

      boot();

      updateHUD();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
